name: Noetica Daily Intelligence

on:
  schedule:
    - cron: '0 8 * * *' # Run at 8:00 AM UTC daily
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0 # Fallback version for stability

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 sqlalchemy

      - name: Execute V3 Data Ingestion & Graph Computation
        run: |
          # Sets up the local SQLite database and pipes data to the Zig engine
          python backend/ingest_v3.py

      - name: Generate & Send Email Report
        env:
          NOETICA_EMAIL: ${{ secrets.NOETICA_EMAIL }}
          NOETICA_APP_PASSWORD: ${{ secrets.NOETICA_APP_PASSWORD }}
          NOETICA_SUBSCRIBERS: ${{ secrets.NOETICA_SUBSCRIBERS }}
        run: |
          python src/send_daily_report.py
