<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <!-- Filter for glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Stage 1: Speculative -->
  <circle cx="80" cy="40" r="2.5" fill="#4a5a75" opacity="0.35" filter="url(#glow)"/>
  <text x="80" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5a6a85" opacity="0.5">Speculative</text>
  
  <!-- Stage 2: Emerging -->
  <circle cx="230" cy="40" r="4" fill="#6b7fa0" opacity="0.45" filter="url(#glow)"/>
  <text x="230" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7fa0" opacity="0.6">Emerging</text>
  
  <!-- Stage 3: Growing -->
  <circle cx="380" cy="40" r="5.5" fill="#7b8fb8" opacity="0.55" filter="url(#glow)"/>
  <text x="380" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#7b8fb8" opacity="0.7">Growing</text>
  
  <!-- Stage 4: Breakthrough -->
  <circle cx="530" cy="40" r="7.5" fill="#a78bdb" opacity="0.65" filter="url(#glow)"/>
  <text x="530" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#a78bdb" opacity="0.8">Breakthrough</text>
  
  <!-- Stage 5: Established -->
  <circle cx="670" cy="40" r="9.5" fill="#d4a0b0" opacity="0.75" filter="url(#glow)"/>
  <text x="670" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d4a0b0" opacity="0.9">Established</text>
  
  <!-- Stage 6: Foundational -->
  <circle cx="810" cy="40" r="11.5" fill="#d4a860" opacity="0.85" filter="url(#glow)"/>
  <text x="810" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d4a860" opacity="0.95">Foundational</text>
  
  <!-- Stage 7: Civilizational -->
  <circle cx="950" cy="40" r="13.5" fill="#f5c842" opacity="0.95" filter="url(#glow)"/>
  <text x="950" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#f5c842" opacity="1.0">Civilizational</text>
  
  <!-- Stage 8: Historical -->
  <circle cx="1100" cy="40" r="16" fill="#fcf0b1" opacity="1.0" filter="url(#glow)"/>
  <text x="1100" y="75" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#fcf0b1" opacity="1.0">Historical</text>
</svg>
