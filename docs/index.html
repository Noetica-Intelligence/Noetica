<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noetica | Civilizational Intelligence</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Three.js and Post-Processing -->
    <script src="https://unpkg.com/three"></script>
    
    <!-- 3D Force Graph -->
    <script src="https://unpkg.com/3d-force-graph"></script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- 3D Canvas -->
    <div id="3d-graph"></div>
    <div id="loader">INITIALIZING ZIG ENGINE...</div>

    <!-- UI Overlay -->
    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <img src="./logo.jpg" alt="Noetica Logo" class="brand-logo">
                    <div class="brand-text">
                        <h1 class="logo-title">Noetica</h1>
                        <div class="tagline">CIVILIZATIONAL INTELLIGENCE</div>
                    </div>
                </div>
            </div>
            
            <div class="discovery-list" id="discovery-list">
                <!-- Discovery cards injected here by JS -->
            </div>
        </div>
    </div>

    <!-- Modal for Discovery Details -->
    <div class="modal-overlay" id="discovery-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <h2 class="modal-title" id="modal-title">Loading...</h2>
            <div class="modal-tags" id="modal-tags"></div>
            <div class="modal-abstract" id="modal-abstract"></div>
            <div class="modal-sources" id="modal-sources"></div>
        </div>
    </div>

    <!-- External Javascript -->
    <script src="./app.js"></script>
</body>
</html>
