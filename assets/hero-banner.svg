<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 150" width="1200" height="150">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0f1d32"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="150" fill="url(#bg)"/>
  
  <!-- Subtle constellation lines (left) -->
  <g stroke="#2a3a55" stroke-width="0.5" opacity="0.6">
    <line x1="80" y1="40" x2="140" y2="80"/>
    <line x1="140" y1="80" x2="120" y2="140"/>
    <line x1="140" y1="80" x2="200" y2="60"/>
    <line x1="200" y1="60" x2="240" y2="100"/>
  </g>
  
  <!-- Subtle constellation lines (right) -->
  <g stroke="#2a3a55" stroke-width="0.5" opacity="0.6">
    <line x1="960" y1="50" x2="1020" y2="90"/>
    <line x1="1020" y1="90" x2="1000" y2="150"/>
    <line x1="1020" y1="90" x2="1080" y2="70"/>
    <line x1="1080" y1="70" x2="1120" y2="110"/>
  </g>
  
  <!-- Constellation dots (left) -->
  <circle cx="80" cy="40" r="2" fill="#4a5a75" opacity="0.7"/>
  <circle cx="140" cy="80" r="2.5" fill="#5a6a85" opacity="0.7"/>
  <circle cx="120" cy="140" r="1.5" fill="#4a5a75" opacity="0.5"/>
  <circle cx="200" cy="60" r="2" fill="#4a5a75" opacity="0.6"/>
  <circle cx="240" cy="100" r="1.5" fill="#4a5a75" opacity="0.5"/>
  
  <!-- Constellation dots (right) -->
  <circle cx="960" cy="50" r="2" fill="#4a5a75" opacity="0.7"/>
  <circle cx="1020" cy="90" r="2.5" fill="#5a6a85" opacity="0.7"/>
  <circle cx="1000" cy="150" r="1.5" fill="#4a5a75" opacity="0.5"/>
  <circle cx="1080" cy="70" r="2" fill="#4a5a75" opacity="0.6"/>
  <circle cx="1120" cy="110" r="1.5" fill="#4a5a75" opacity="0.5"/>
  
  <!-- Scattered stars -->
  <circle cx="350" cy="30" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="500" cy="20" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="700" cy="25" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="850" cy="25" r="0.8" fill="#ffffff" opacity="0.3"/>
  <circle cx="420" cy="120" r="0.8" fill="#ffffff" opacity="0.2"/>
  <circle cx="780" cy="110" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="300" cy="100" r="0.6" fill="#ffffff" opacity="0.2"/>
  <circle cx="900" cy="130" r="0.6" fill="#ffffff" opacity="0.15"/>
  
  <!-- Title text -->
  <text x="600" y="65" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="48" font-weight="400" letter-spacing="18" fill="#e8e0d4" opacity="0.95">NOETICA</text>
  
  <!-- Subtitle -->
  <text x="600" y="105" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="13" font-weight="300" letter-spacing="6" fill="#8a9bb5" opacity="0.8" font-style="italic">MAPPING THE EVOLUTION OF HUMAN KNOWLEDGE</text>
  
  <!-- Subtle separator line -->
  <line x1="545" y1="120" x2="655" y2="120" stroke="#3a4a65" stroke-width="0.5" opacity="0.5"/>
</svg>
