name: Noetica Daily Intelligence

on:
  schedule:
    - cron: '20 2 * * *' # 02:20 UTC = 07:50 AM IST (offset to ensure delivery by 08:00 AM IST)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0 # Fallback version for stability

      - name: Build Zig Engine
        run: |
          cd zig_engine
          zig build

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate & Send Email Report
        env:
          SENDER_EMAIL: ${{ secrets.NOETICA_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.NOETICA_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.NOETICA_EMAIL }}
          NOETICA_SUBSCRIBERS: ${{ secrets.NOETICA_SUBSCRIBERS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          FEEDBACK_SHEET_ID: ${{ secrets.FEEDBACK_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python src/main.py
