<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noetica - Global Scientific Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cosmos-bg"></div>
    
    <header class="hero">
        <div class="hero-content">
            <h1 class="logo-text">N O E T I C A</h1>
            <p class="subtitle">Mapping the Evolution of Human Knowledge</p>
            <p class="description">
                Tracking the single highest-signal breakthrough across 31 scientific paradigms and 5 discovery categories. 
                Updated daily by the Noetica Scoring Engine.
            </p>
        </div>
    </header>

    <main class="dashboard-container">
        <aside class="sidebar">
            <h3 class="sidebar-title">Paradigms</h3>
            <ul id="paradigm-list" class="paradigm-list">
                <!-- Dynamically populated -->
            </ul>
        </aside>
        
        <section class="content-area">
            <div class="content-header">
                <h2 id="current-paradigm">Select a Paradigm</h2>
            </div>
            
            <div id="discovery-grid" class="discovery-grid">
                <!-- Dynamically populated 5 cards -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
