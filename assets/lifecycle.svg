<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f1d32"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="100" rx="8" fill="url(#lbg)"/>
  
  <!-- Stage 1: Speculative -->
  <circle cx="80" cy="40" r="3" fill="#4a5a75" opacity="0.6"/>
  <text x="80" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#5a6a85" opacity="0.8">Speculative</text>
  
  <!-- Stage 2: Emerging -->
  <circle cx="230" cy="38" r="4" fill="#6b7fa0" opacity="0.7"/>
  <text x="230" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#6b7fa0" opacity="0.85">Emerging</text>
  
  <!-- Stage 3: Growing -->
  <circle cx="380" cy="36" r="5.5" fill="#7b8fb8" opacity="0.75"/>
  <text x="380" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#7b8fb8" opacity="0.85">Growing</text>
  
  <!-- Stage 4: Breakthrough -->
  <circle cx="530" cy="34" r="7" fill="#a78bdb" opacity="0.8"/>
  <text x="530" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#a78bdb" opacity="0.9">Breakthrough</text>
  
  <!-- Stage 5: Established -->
  <circle cx="670" cy="34" r="8" fill="#d4a0b0" opacity="0.8"/>
  <text x="670" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d4a0b0" opacity="0.9">Established</text>
  
  <!-- Stage 6: Foundational -->
  <circle cx="810" cy="32" r="9.5" fill="#d4a860" opacity="0.85"/>
  <text x="810" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d4a860" opacity="0.9">Foundational</text>
  
  <!-- Stage 7: Civilizational -->
  <circle cx="950" cy="30" r="11" fill="#f5c842" opacity="0.9"/>
  <text x="950" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#f5c842" opacity="0.9">Civilizational</text>
  
  <!-- Stage 8: Historical -->
  <circle cx="1100" cy="30" r="11" fill="#d4a030" opacity="0.85"/>
  <text x="1100" y="72" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d4a030" opacity="0.9">Historical</text>
</svg>
